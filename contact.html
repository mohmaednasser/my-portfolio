<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Mohamed Helal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'JetBrains Mono', monospace; background-color: #1c1c22; color: white; margin: 0; }
        .text-accent { color: #00ff99; }
        .bg-accent { background-color: #00ff99; }
        
        /* ستايل الفريم الموحد للهيدر */
        .header-frame {
            background-color: rgba(35, 35, 41, 0.5);
            border: 1px solid rgba(0, 255, 153, 0.4);
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .input-field {
            background-color: #1c1c22;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 12px 20px;
            color: white;
            width: 100%;
            outline: none;
            transition: 0.3s;
        }
        .input-field:focus { border-color: #00ff99; box-shadow: 0 0 10px rgba(0, 255, 153, 0.1); }

        .info-icon {
            width: 52px;
            height: 52px;
            background-color: #232329;
            color: #00ff99;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            border: 1px solid transparent;
            transition: 0.3s;
        }
        .info-icon:hover { border-color: #00ff99; background-color: #27272c; }

        .send-btn {
            background-color: #00ff99;
            color: #1c1c22;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
            border: none;
        }
        .send-btn:hover { background-color: #00e68a; box-shadow: 0 0 15px rgba(0, 255, 153, 0.3); }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 60px;
        }

        @media (max-width: 968px) {
            .main-container { grid-template-columns: 1fr; padding: 20px; }
        }
        
    </style>
</head>
<body class="antialiased">

    <header class="max-w-7xl mx-auto px-8 py-10">
        <div class="header-frame px-8 py-4 rounded-full flex justify-between items-center shadow-[0_0_20px_rgba(0,255,153,0.1)]">
            <h1 class="text-3xl font-bold">Mohamed<span class="text-accent">.</span></h1>
            <nav>
                <ul class="hidden md:flex gap-8 text-base font-medium">
                    <li><a href="index.html" class="hover:text-accent transition-all">Home</a></li>
                    <li><a href="services.html" class="hover:text-accent transition-all">Services</a></li>
                    <li><a href="resume.html" class="hover:text-accent transition-all">Resume</a></li>
                    <li><a href="work.html" class="hover:text-accent transition-all">Work</a></li>
                    <li class="text-[#00ff99] border-b-2 border-[#00ff99] pb-1">Contact</li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-container">
        <div class="bg-[#27272c] p-10 rounded-xl border border-white/5">
            <h2 class="text-4xl font-bold text-accent mb-4">Let's work together</h2>
            <p class="text-gray-400 mb-8">
                I am ready to help you transform your data into visual masterpieces or build your next project.
            </p>
            
            <form action="https://formspree.io/f/mlgaeaby" method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" name="Firstname" placeholder="Firstname" class="input-field" required>
                <input type="text" name="Lastname" placeholder="Lastname" class="input-field" required>
                <input type="email" name="Email" placeholder="Email address" class="input-field" required>
                <input type="text" name="Phone" placeholder="Phone number" class="input-field">
                
                <div class="md:col-span-2">
                    <select name="Service" class="input-field appearance-none bg-[#1c1c22]">
                        <option disabled selected>Select a service</option>
                        <option value="Data Analysis">Data Analysis</option>
                        <option value="Database Design">Database Design</option>
                        <option value="Power BI Dashboard">Power BI Dashboard</option>
                        <option value="Coaching">Coaching</option>
                    </select>
                </div>
                
                <div class="md:col-span-2">
                    <textarea name="Message" placeholder="Type your message here." rows="6" class="input-field resize-none" required></textarea>
                </div>
                
                <div class="mt-4">
                    <button type="submit" class="send-btn">Send message</button>
                </div>
            </form>
        </div>

        <div class="flex flex-col gap-10 justify-center px-4">
            <div class="flex items-center gap-6">
                <div class="info-icon"><i class="fa-solid fa-phone"></i></div>
                <div>
                    <p class="text-gray-400 text-sm">Phone</p>
                    <p class="text-lg font-bold">010-196-224-75</p>
                </div>
            </div>
            <div class="flex items-center gap-6">
                <div class="info-icon"><i class="fa-solid fa-envelope"></i></div>
                <div>
                    <p class="text-gray-400 text-sm">Email</p>
                    <p class="text-lg font-bold">nasserhelal34@gmail.com</p>
                </div>
            </div>
            <div class="flex items-center gap-6">
                <div class="info-icon"><i class="fa-solid fa-location-dot"></i></div>
                <div>
                    <p class="text-gray-400 text-sm">Address</p>
                    <p class="text-lg font-bold">Zagazig, Egypt</p>
                </div>
            </div>
        </div>
    </main>

<script>
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const service = urlParams.get('service');
        if (service) {
            const selectElement = document.querySelector('select[name="Service"]');
            if (selectElement) {
                selectElement.value = service;
            }
        }
    }
</script>

</body>
</html>
