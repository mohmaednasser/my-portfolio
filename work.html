<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work - Mohamed Helal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'JetBrains Mono', monospace; background-color: #1c1c22; color: white; margin: 0; }
        .text-accent { color: #00ff99; }
        .bg-accent { background-color: #00ff99; }
        
        .header-frame {
            background-color: rgba(35, 35, 41, 0.5);
            border: 1px solid rgba(0, 255, 153, 0.4);
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .project-number {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            -webkit-text-stroke: 1px white;
            color: transparent;
            transition: 0.3s;
        }

        .view-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: #232329;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
            text-decoration: none;
        }
        .view-btn:hover { background-color: #00ff99; color: #1c1c22; border-color: #00ff99; }

        .slider-btn {
            background-color: #00ff99;
            color: #1c1c22;
            width: 48px;
            height: 48px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }
        .slider-btn:disabled {
            background-color: #333;
            color: #777;
            cursor: not-allowed;
            opacity: 0.5;
        }
        .slider-btn:not(:disabled):hover { 
            background-color: #00e68a; 
            box-shadow: 0 0 15px rgba(0, 255, 153, 0.4);
        }

        #project-display { transition: opacity 0.3s ease-in-out; }
        
    </style>
</head>
<body class="antialiased">

    <header class="max-w-7xl mx-auto px-8 py-10">
        <div class="header-frame px-8 py-4 rounded-full flex justify-between items-center shadow-[0_0_20px_rgba(0,255,153,0.1)]">
            <h1 class="text-3xl font-bold text-white">Mohamed<span class="text-accent">.</span></h1>
            <nav>
                <ul class="hidden md:flex gap-8 text-base font-medium">
                    <li><a href="index.html" class="hover:text-accent transition-all">Home</a></li>
                    <li><a href="services.html" class="hover:text-accent transition-all">Services</a></li>
                    <li><a href="resume.html" class="hover:text-accent transition-all">Resume</a></li>
                    <li class="text-[#00ff99] border-b-2 border-[#00ff99] pb-1 cursor-default">Work</li>
                    <li><a href="contact.html" class="hover:text-accent transition-all">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-8 py-12 flex flex-col md:flex-row gap-[50px] items-center" id="project-display">
        
        <div class="w-full md:w-[40%] flex flex-col gap-6">
            <div class="project-number" id="p-num">01</div>
            <h2 class="text-5xl font-bold" id="p-title">Project Title</h2>
            <p class="text-gray-400 text-lg leading-relaxed h-[100px]" id="p-desc">
                Project description goes here.
            </p>
            <div class="text-accent font-bold text-xl" id="p-tools">
                Tools Used
            </div>
            
            <div class="h-[1px] bg-gray-700 w-full my-4"></div>

            <div>
                <a href="#" id="p-link" target="_blank" class="view-btn">
                    View full project <i class="fa-solid fa-arrow-up-right-from-square"></i>
                </a>
            </div>
        </div>

        <div class="w-full md:w-[60%] flex flex-col gap-4">
            <div class="relative group overflow-hidden rounded-lg bg-[#232329] border border-white/5 shadow-xl group-hover:border-[#00ff99]/30 transition-all duration-500">
                <img src="images/project1.jpg" id="p-img" alt="Project Preview" class="w-full h-auto max-h-[500px] object-contain transition-all duration-500 group-hover:scale-105">
            </div>

            <div class="flex justify-end gap-3">
                <button id="prev-btn" class="slider-btn rounded-sm" onclick="changeProject(-1)">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <button id="next-btn" class="slider-btn rounded-sm" onclick="changeProject(1)">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </main>

    <script>
        const projects = [
            { 
                num: "01", 
                title: "BikeSales Analysis", 
                desc: "An interactive bicycle sales dashboard revealing monthly performance and top-selling products.", 
                tools: "Power BI, Photoshop", 
                link: "https://mohmaednasser.github.io/bike-sales-performance", 
                img: "images/project1.jpg" 
            },
            { 
                num: "02", 
                title: "UK Train Rides", 
                desc: "Analyzed UK train ride data to uncover insights on sales, delays, and customer behavior using SQL and Power BI dashboards.", 
                tools: "Excel, SQL, Power BI", 
                link: "https://github.com/mohmaednasser/UK-Train-Rides", 
                img: "images/project2.jpg" 
            },
            { 
                num: "03", 
                title: "Sales Management & Analytics System", 
                desc: "Built a complete sales analytics solution starting from system requirements and database design, through SQL Server development and data preparation, to advanced Power BI dashboards using DAX for performance analysis and business insights.", 
                tools: "Excel, SQL, Power BI, Photoshop", 
                link: "https://mohmaednasser.github.io/sales-management-analytics-system/", 
                img: "images/project3.jpg" 
            },
            { 
                num: "04", 
                title: "Full Data Analysis Project", 
                desc: "Comprehensive project combining Excel, SQL, and Power BI — complete workflow from raw data to visualization and insights.", 
                tools: "Excel, SQL, Power BI, Photoshop", 
                link: "https://mohmaednasser.github.io/full-data-analysis-project-powerbi/", 
                img: "images/project4.jpg" 
            },
            { 
                num: "05", 
                title: "nti-graduation-project-powerbi", 
                desc: "The dashboard provides insights into sales performance, customer behavior, and overall business trends to support data-driven decision making.", 
                tools: "Power BI, DAX", 
                link: "https://mohmaednasser.github.io/nti-graduation-project-powerbi/", 
                img: "images/project5.jpg" 
            },
            { 
                num: "06", 
                title: "Egypt Car Accidents", 
                desc: "his project analyzes car accidents in Egypt from 2022 to 2024.", 
                tools: "Excel, Power BI, Python, Photoshop, Figma", 
                link: "https://github.com/mohmaednasser/Egypt-Car-Accidents-Analysis", 
                img: "images/project6.jpg" 
            }
        ];

        let currentIndex = 0;

        function updateButtons() {
            document.getElementById('prev-btn').disabled = (currentIndex === 0);
            document.getElementById('next-btn').disabled = (currentIndex === projects.length - 1);
        }

        function changeProject(direction) {
            const nextIndex = currentIndex + direction;
            
            if (nextIndex >= 0 && nextIndex < projects.length) {
                currentIndex = nextIndex;
                const p = projects[currentIndex];
                const display = document.getElementById('project-display');
                
                display.style.opacity = 0;
                setTimeout(() => {
                    document.getElementById('p-num').innerText = p.num;
                    document.getElementById('p-title').innerText = p.title;
                    document.getElementById('p-desc').innerText = p.desc;
                    document.getElementById('p-tools').innerText = p.tools;
                    document.getElementById('p-link').href = p.link;
                    document.getElementById('p-img').src = p.img;
                    display.style.opacity = 1;
                    updateButtons();
                }, 200);
            }
        }
        
        window.onload = () => {
            changeProject(0);
        };
    </script>
</body>
</html>
